<!DOCTYPE html>
<!--
  Interface minimaliste — mémoire de conversation (v1 : voir l'historique + créer une conversation).
  Une seule page, JS vanilla, zéro dépendance. Elle ne fait qu'appeler l'API locale de serveur.py.
  Honnêteté : on n'affiche QUE ce que le serveur renvoie (tours réels, verbatim). Aucune invention côté front.
-->
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mémoire de conversation</title>
<style>
  :root {
    --bg: #faf9f7; --panneau: #ffffff; --bord: #e7e4df; --texte: #2b2a27;
    --doux: #8a857d; --accent: #4a6b5a; --user: #eef3f0; --autre: #f4f2ee;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
    color: var(--texte); background: var(--bg); height: 100vh; display: flex;
  }
  /* — colonne gauche : liste des conversations — */
  #cote {
    width: 280px; min-width: 280px; border-right: 1px solid var(--bord);
    background: var(--panneau); display: flex; flex-direction: column;
  }
  #cote header { padding: 16px; border-bottom: 1px solid var(--bord); }
  #cote header h1 { margin: 0; font-size: 15px; font-weight: 600; }
  #cote header p { margin: 2px 0 0; font-size: 12px; color: var(--doux); }
  #btn-nouvelle {
    margin: 12px 16px; padding: 9px; border: 1px solid var(--accent); border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px; cursor: pointer;
  }
  #btn-nouvelle:hover { opacity: .9; }
  #liste { flex: 1; overflow-y: auto; padding: 4px 8px 16px; }
  .conv {
    padding: 9px 10px; border-radius: 8px; cursor: pointer; display: flex;
    justify-content: space-between; align-items: center; gap: 8px;
  }
  .conv:hover { background: var(--autre); }
  .conv.actif { background: var(--user); }
  .conv .nom { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv .meta { font-size: 11px; color: var(--doux); white-space: nowrap; }
  .conv .suppr { color: var(--doux); border: none; background: none; cursor: pointer; font-size: 13px; display: none; }
  .conv:hover .suppr { display: inline; }
  .vide { color: var(--doux); font-size: 13px; padding: 16px; text-align: center; }
  /* — colonne droite : le fil — */
  #fil { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #titre { padding: 16px; border-bottom: 1px solid var(--bord); background: var(--panneau); }
  #titre h2 { margin: 0; font-size: 15px; font-weight: 600; }
  #titre .scope { font-size: 11px; color: var(--doux); }
  #tours { flex: 1; overflow-y: auto; padding: 20px; }
  .tour { max-width: 70%; margin-bottom: 14px; padding: 10px 13px; border-radius: 12px; background: var(--autre); }
  .tour.user { background: var(--user); margin-left: auto; }
  .tour .qui { font-size: 11px; color: var(--doux); margin-bottom: 3px; }
  .tour .corps { white-space: pre-wrap; word-wrap: break-word; }
  #saisie { padding: 14px 16px; border-top: 1px solid var(--bord); background: var(--panneau); display: flex; gap: 8px; }
  #champ {
    flex: 1; resize: none; height: 44px; padding: 11px; border: 1px solid var(--bord);
    border-radius: 10px; font: inherit; color: inherit;
  }
  #envoyer { padding: 0 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; cursor: pointer; }
  #envoyer:disabled { opacity: .4; cursor: default; }
  .centre { margin: auto; color: var(--doux); text-align: center; }
</style>
</head>
<body>
  <aside id="cote">
    <header>
      <h1>Conversations</h1>
      <p>local &amp; souverain · rien ne sort de la machine</p>
    </header>
    <button id="btn-nouvelle">+ Nouvelle conversation</button>
    <div id="liste"><div class="vide">Chargement…</div></div>
  </aside>

  <main id="fil">
    <div id="titre"><h2>—</h2><span class="scope"></span></div>
    <div id="tours"><div class="centre">Sélectionne une conversation, ou crée-en une.</div></div>
    <div id="saisie">
      <textarea id="champ" placeholder="Écris un message…" disabled></textarea>
      <button id="envoyer" disabled>Envoyer</button>
    </div>
  </main>

<script>
"use strict";
// — état minimal côté client —
let actif = null;        // id de la conversation ouverte (peut être « neuve », pas encore sur le disque)
let neuve = null;        // id d'une conversation créée mais sans message (n'existe pas encore au stockage)

const $ = (s) => document.querySelector(s);
async function api(chemin, opts) {
  const r = await fetch(chemin, opts);
  return r.json();
}
function horodate(ts) {
  try { return new Date(ts * 1000).toLocaleString("fr-FR"); } catch { return ""; }
}

// — colonne gauche : liste —
async function chargeListe() {
  const { items } = await api("/api/conversations");
  const liste = $("#liste");
  // une conversation « neuve » sans message n'est pas encore sur le disque : on l'affiche quand même en tête.
  const tout = [...items];
  if (neuve && !items.some((c) => c.id === neuve)) tout.unshift({ id: neuve, scope: "prive", n: 0, neuve: true });
  if (tout.length === 0) { liste.innerHTML = '<div class="vide">Aucune conversation pour l\'instant.</div>'; return; }
  liste.innerHTML = "";
  for (const c of tout) {
    const el = document.createElement("div");
    el.className = "conv" + (c.id === actif ? " actif" : "");
    const meta = c.neuve ? "vide" : `${c.n} tour${c.n > 1 ? "s" : ""} · ${c.scope}`;
    el.innerHTML = `<span class="nom"></span><span class="meta">${meta}</span><button class="suppr" title="Retirer de l'historique (l'IA s'en souvient quand même)">✕</button>`;
    el.querySelector(".nom").textContent = c.id;       // textContent : jamais d'injection HTML
    el.querySelector(".nom").onclick = () => ouvre(c.id);
    el.querySelector(".meta").onclick = () => ouvre(c.id);
    el.querySelector(".suppr").onclick = (e) => { e.stopPropagation(); archive(c.id); };
    liste.appendChild(el);
  }
}

// — colonne droite : le fil d'une conversation —
async function ouvre(id) {
  actif = id;
  const { tours, scope } = await api("/api/conversation?id=" + encodeURIComponent(id));
  $("#titre h2").textContent = id;
  $("#titre .scope").textContent = scope ? "· " + scope : "";
  const flux = $("#tours");
  if (!tours || tours.length === 0) {
    flux.innerHTML = '<div class="centre">Conversation vide — écris le premier message.</div>';
  } else {
    flux.innerHTML = "";
    for (const t of tours) {
      const el = document.createElement("div");
      el.className = "tour" + (t.role === "user" ? " user" : "");
      el.innerHTML = `<div class="qui"></div><div class="corps"></div>`;
      el.querySelector(".qui").textContent = t.role + " · " + horodate(t.ts);
      el.querySelector(".corps").textContent = t.texte;   // VERBATIM, jamais reformulé
      flux.appendChild(el);
    }
    flux.scrollTop = flux.scrollHeight;
  }
  $("#champ").disabled = false; $("#envoyer").disabled = false; $("#champ").focus();
  chargeListe();
}

// — créer —
$("#btn-nouvelle").onclick = async () => {
  const nom = prompt("Nom de la nouvelle conversation :");
  if (!nom || !nom.trim()) return;
  const r = await api("/api/nouvelle", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: nom.trim() }) });
  if (!r.ok) { alert(r.raison || "échec"); return; }
  if (r.existe) { neuve = null; ouvre(r.id); return; }   // existait déjà : on l'ouvre simplement
  neuve = r.id;                                          // sinon : créée côté client, persistée au 1ᵉʳ message
  ouvre(r.id);
};

// — envoyer un message —
async function envoie() {
  const champ = $("#champ");
  const texte = champ.value.trim();
  if (!texte || !actif) return;
  champ.value = "";
  const r = await api("/api/message", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id: actif, texte }) });
  if (r.id === neuve) neuve = null;       // désormais persistée
  ouvre(actif);                           // relit l'état réel depuis le serveur (pas d'optimisme aveugle)
}
$("#envoyer").onclick = envoie;
$("#champ").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); envoie(); }   // Entrée = envoyer, Maj+Entrée = saut de ligne
});

// — retirer de l'historique (ARCHIVE : caché de l'UI, mais l'IA s'en souvient toujours) —
async function archive(id) {
  if (!confirm(`Retirer « ${id} » de l'historique ?\nElle disparaît de la liste, mais l'IA continue de s'en souvenir.`)) return;
  await api("/api/archive", { method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id }) });
  if (id === neuve) neuve = null;
  if (id === actif) {
    actif = null;
    $("#titre h2").textContent = "—"; $("#titre .scope").textContent = "";
    $("#tours").innerHTML = '<div class="centre">Sélectionne une conversation, ou crée-en une.</div>';
    $("#champ").disabled = true; $("#envoyer").disabled = true;
  }
  chargeListe();
}

chargeListe();
</script>
</body>
</html>
