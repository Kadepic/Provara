name: Build Windows .exe
on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [created]
env:
  # BASCULE ONEDIR (remède antivirus, décision Yohan 2026-07-06) : le --onefile se ré-extrait dans %TEMP% à
  # CHAQUE lancement -> l'AV rescanne tout (minutes de lenteur) et verrouille parfois python3xx.dll (« Failed
  # to load Python DLL »). Passer ONEDIR à "1" UNIQUEMENT quand le build 48 (updater v2, sait installer
  # Provara-app.zip) est largement diffusé. Le flip publie Provara-app.zip et FIGE Provara.exe/
  # Provara-windows.zip au dernier build onefile : un updater <= 47 installera ce pont, qui migrera ensuite
  # tout seul vers le paquet-dossier. NE JAMAIS publier un exe onedir sous le nom Provara.exe (updaters
  # anciens = app cassée chez tous les users).
  ONEDIR: "1"          # FLIP fait le 2026-07-06 (GO Yohan) : build 49+ = paquet-dossier Provara-app.zip
jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write        # requis pour attacher le .exe à la Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # tzdata = base de fuseaux IANA pour zoneinfo (l'heure des villes : « quelle heure est-il à New York ? »).
      # Sans elle le .exe Windows s'abstient honnêtement (dégradation propre) ; avec, il répond.
      - run: pip install pyinstaller tzdata
      - name: Tamponner le build (numéro MONOTONE + commit) dans VERSION_BUILD.txt
        shell: bash
        # GITHUB_RUN_NUMBER = entier qui CROÎT à chaque exécution du workflow -> sert de « version » pour décider
        # « plus récent » côté auto-update (maj.py compare ces numéros). Le commit reste tamponné pour tracer.
        run: echo "$GITHUB_RUN_NUMBER $GITHUB_SHA" > VERSION_BUILD.txt
      - name: Build Provara.exe
        run: >
          pyinstaller ${{ env.ONEDIR == '1' && '--onedir' || '--onefile' }} --name Provara --noconsole
          --paths src --paths ingestion --paths interface
          --hidden-import _precharge_verax
          --hidden-import ia --hidden-import lecteur --hidden-import base_faits
          --hidden-import serveur --hidden-import repond --hidden-import conversation
          --hidden-import assistant_nl --hidden-import veille_structure --hidden-import faits_appris --hidden-import tronc --hidden-import sequenceur --hidden-import fonction_nl
          --hidden-import correction_ortho --hidden-import synonymes --hidden-import formulation
          --hidden-import est_un --hidden-import ontologie --hidden-import classifieur_bornage --hidden-import resolution
          --hidden-import realisation_fr --hidden-import deduction --hidden-import induction_horn --hidden-import maj
          --add-data "src;src"
          --add-data "ingestion;ingestion"
          --add-data "interface;interface"
          --add-data "datasets/lecteur;datasets/lecteur"
          --add-data "verax_boot.py;."
          --add-data "VERSION_BUILD.txt;."
          --hidden-import json --hidden-import csv --hidden-import sqlite3
          --hidden-import wave --hidden-import struct --hidden-import array
          --hidden-import zlib --hidden-import gzip --hidden-import bz2 --hidden-import lzma --hidden-import hashlib
          --hidden-import decimal --hidden-import fractions --hidden-import statistics
          --hidden-import unicodedata --hidden-import secrets --hidden-import uuid
          --hidden-import "xml.etree.ElementTree" --hidden-import "urllib.request" --hidden-import "urllib.parse"
          --hidden-import "http.server" --hidden-import socketserver --hidden-import zipfile --hidden-import tarfile
          --hidden-import marshal --hidden-import base64 --hidden-import difflib --hidden-import calendar
          --hidden-import zoneinfo --hidden-import tzdata --collect-data tzdata
          lance.py
      - uses: actions/upload-artifact@v4
        with:
          name: Provara-windows
          path: dist/Provara*         # onefile : dist/Provara.exe ; onedir : dist/Provara/ (exe + _internal)
      - name: Publier la Release ROULANTE « latest » (auto-update à chaque push)
        # OBJECTIF : après un simple commit+push, les utilisateurs reçoivent la mise à jour SANS action.
        # On maintient une Release au tag fixe « latest » : on y REMPLACE (--clobber) le paquet .exe (zip) ET un
        # petit `version.txt` (numéro de build monotone + commit) que maj.py lit pour décider « plus récent ».
        # Sur un évènement "release" classique, on attache AUSSI au tag concerné (compat historique).
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          if [ "$ONEDIR" = "1" ]; then
            # Paquet DOSSIER (builds >= 49) : Provara.exe + _internal\ à la RACINE du zip (attendu par maj.py).
            powershell -Command "Compress-Archive -Path dist/Provara/* -DestinationPath dist/Provara-app.zip -Force"
          else
            powershell -Command "Compress-Archive -Path dist/Provara.exe -DestinationPath dist/Provara-windows.zip -Force"
          fi
          cp VERSION_BUILD.txt dist/version.txt
          # Release roulante « latest » : créée si absente, sinon mise à jour.
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest --title "Provara — dernière version" \
              --notes "Build automatique (run #$GITHUB_RUN_NUMBER, commit $GITHUB_SHA). Mise à jour reçue automatiquement par les .exe installés." \
              --latest
          else
            gh release edit latest --notes "Build automatique (run #$GITHUB_RUN_NUMBER, commit $GITHUB_SHA)." --latest
          fi
          if [ "$ONEDIR" = "1" ]; then
            # SURTOUT ne pas toucher Provara.exe / Provara-windows.zip : figés au dernier onefile, ils servent
            # de PONT aux updaters <= 47 (qui installeront ce pont, lequel migrera seul vers le paquet-dossier).
            gh release upload latest dist/Provara-app.zip dist/version.txt --clobber
          else
            # On publie AUSSI le .exe BRUT : lien direct stable pour les non-techniciens (double-clic, aucun
            # décompactage) -> https://github.com/Provara-IA/Provara/releases/latest/download/Provara.exe
            gh release upload latest dist/Provara.exe dist/Provara-windows.zip dist/version.txt --clobber
          fi
          # Compat : si l'évènement est une vraie Release taguée, on y met aussi le paquet.
          if [ "${{ github.event_name }}" = "release" ] && [ -n "${{ github.event.release.tag_name }}" ]; then
            gh release upload "${{ github.event.release.tag_name }}" dist/Provara-windows.zip dist/version.txt --clobber || true
          fi
