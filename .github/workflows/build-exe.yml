name: Build Windows .exe
on:
  workflow_dispatch:
  push:
    branches: [main]
  release:
    types: [created]
jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write        # requis pour attacher le .exe à la Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - name: Tamponner le commit du build (VERSION_BUILD.txt)
        shell: bash
        run: echo "$GITHUB_SHA" > VERSION_BUILD.txt
      - name: Build Provara.exe
        run: >
          pyinstaller --onefile --name Provara --noconsole
          --paths src --paths ingestion --paths interface
          --hidden-import _precharge_verax
          --hidden-import ia --hidden-import lecteur --hidden-import base_faits
          --hidden-import serveur --hidden-import repond --hidden-import conversation
          --hidden-import assistant_nl --hidden-import veille_structure --hidden-import fonction_nl
          --hidden-import correction_ortho --hidden-import synonymes --hidden-import formulation
          --hidden-import est_un --hidden-import ontologie --hidden-import classifieur_bornage --hidden-import resolution
          --hidden-import realisation_fr --hidden-import deduction --hidden-import induction_horn
          --add-data "src;src"
          --add-data "ingestion;ingestion"
          --add-data "interface;interface"
          --add-data "datasets/lecteur;datasets/lecteur"
          --add-data "verax_boot.py;."
          --add-data "VERSION_BUILD.txt;."
          --hidden-import json --hidden-import csv --hidden-import sqlite3
          --hidden-import wave --hidden-import struct --hidden-import array
          --hidden-import zlib --hidden-import gzip --hidden-import bz2 --hidden-import lzma --hidden-import hashlib
          --hidden-import decimal --hidden-import fractions --hidden-import statistics
          --hidden-import unicodedata --hidden-import secrets --hidden-import uuid
          --hidden-import "xml.etree.ElementTree" --hidden-import "urllib.request" --hidden-import "urllib.parse"
          --hidden-import "http.server" --hidden-import socketserver --hidden-import zipfile --hidden-import tarfile
          --hidden-import marshal --hidden-import base64 --hidden-import difflib --hidden-import calendar
          lance.py
      - uses: actions/upload-artifact@v4
        with:
          name: Provara-windows
          path: dist/Provara.exe
      - name: Attacher Provara-windows.zip à la Release
        # Sur un évènement "release", attache au tag concerné ; en lancement manuel (workflow_dispatch),
        # attache à la dernière Release publiée. Zippe l'exe (Provara-windows.zip) et REMPLACE l'asset de même
        # nom (--clobber) -> pas de doublon, le zip périmé est écrasé par le build courant (SHA tamponné).
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -z "$TAG" ]; then TAG=$(gh release list -L1 --json tagName -q '.[0].tagName'); fi
          powershell -Command "Compress-Archive -Path dist/Provara.exe -DestinationPath dist/Provara-windows.zip -Force"
          echo "Upload dist/Provara-windows.zip -> release $TAG"
          gh release upload "$TAG" dist/Provara-windows.zip --clobber
